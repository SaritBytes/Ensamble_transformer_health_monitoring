<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer Health Monitor | Real-Time Dashboard</title>
    <meta name="description" content="Real-time power transformer health monitoring dashboard using ensemble machine learning and FIFO memory architecture.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div class="container">
        <!-- HEADER -->
        <header class="glass-card header-bar">
            <div class="header-left">
                <div class="logo-icon">⚡</div>
                <div>
                    <h1>Transformer Health <span class="accent">Monitor</span></h1>
                    <p class="subtitle">Real-Time Ensemble ML Dashboard</p>
                </div>
            </div>
            <div class="header-right">
                <div class="live-dot" id="live-dot"></div>
                <span class="live-label" id="live-label">Loading...</span>
            </div>
        </header>

        <!-- ALERT BANNER -->
        <div class="alert-banner hidden" id="alert-banner">
            <div class="alert-icon">⚠</div>
            <span id="alert-text"></span>
        </div>

        <!-- TOP STATS ROW -->
        <div class="stats-row">
            <div class="stat-card glass-card">
                <div class="stat-label">Buffer Usage</div>
                <div class="stat-value" id="stat-buffer">0 / 1440</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-label">Avg Confidence</div>
                <div class="stat-value" id="stat-avg-conf">--</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-label">Current Health</div>
                <div class="stat-value stat-health" id="stat-health">--</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-label">Last Updated</div>
                <div class="stat-value stat-time" id="stat-time">--</div>
            </div>
        </div>

        <!-- MAIN GRID -->
        <div class="main-grid">
            <!-- CHART -->
            <div class="glass-card chart-panel">
                <h2 class="panel-title">Health Confidence Timeline</h2>
                <div class="chart-wrap">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- PREDICTION PANEL -->
            <div class="glass-card prediction-panel">
                <h2 class="panel-title">Latest Prediction</h2>
                
                <div class="health-badge" id="health-badge">
                    <div class="badge-label" id="badge-label">--</div>
                    <div class="badge-conf" id="badge-conf">--% confidence</div>
                </div>

                <div class="prob-section">
                    <h3 class="prob-title">Class Probabilities</h3>
                    <div id="prob-bars"></div>
                </div>
            </div>
        </div>

        <!-- SENSOR TELEMETRY -->
        <div class="glass-card telemetry-panel">
            <h2 class="panel-title">Live Sensor Telemetry</h2>
            <div class="kpi-grid" id="kpi-grid"></div>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
