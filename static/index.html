<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer Health Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="background-mesh"></div>
    
    <div class="container">
        <header class="glass-panel">
            <div class="header-content">
                <h1>⚡ Transformer Health <span>Monitor</span></h1>
                <div class="status-indicator">
                    <div class="pulse-ring"></div>
                    <span id="global-status">Waiting for data...</span>
                </div>
            </div>
        </header>

        <div id="alert-banner" class="alert-banner hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            <span id="alert-text">Sustained critical failure detected!</span>
        </div>

        <div class="dashboard-grid">
            
            <div class="main-chart glass-panel">
                <h2>Health Confidence Trend</h2>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            
            <div class="side-panel glass-panel">
                <h2>Latest Prediction</h2>
                
                <div class="prediction-box">
                    <h3 id="current-health">--</h3>
                    <p class="confidence">Confidence: <span id="current-conf">--</span>%</p>
                </div>
                
                <div class="probabilities">
                    <h4>Probabilities</h4>
                    <div class="prob-row">
                        <span>Healthy</span>
                        <div class="bar-bg"><div class="bar-fill healthy-fill" id="prob-healthy"></div></div>
                        <span class="prob-val" id="val-healthy">--</span>
                    </div>
                    <div class="prob-row">
                        <span>About to be Unhealthy</span>
                        <div class="bar-bg"><div class="bar-fill warning-fill" id="prob-warning"></div></div>
                        <span class="prob-val" id="val-warning">--</span>
                    </div>
                    <div class="prob-row">
                        <span>Unhealthy</span>
                        <div class="bar-bg"><div class="bar-fill danger-fill" id="prob-danger"></div></div>
                        <span class="prob-val" id="val-danger">--</span>
                    </div>
                </div>
            </div>
            
        </div>
        
        <div class="sensor-grid">
            <h2 class="section-title">Live Sensor Telemetry</h2>
            <div class="kpi-cards" id="kpi-container">
                <!-- KPI cards injected by JS -->
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
